<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSWD 4Ps DMIS – CAR Field Office | Baguio City</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --blue:#003087;--blue-mid:#0057B7;--blue-light:#2979E0;
  --red:#CE1126;--yellow:#FCD116;--dark:#0A1A3A;
  --white:#fff;--gray-bg:#F0F4FA;--border:#D6E0F0;
  --text-main:#1B2A4A;--text-soft:#6B7A9A;
  --sidebar-w:230px;--header-h:62px;
  --green:#1B7A3E;--orange:#D46B00;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--gray-bg);color:var(--text-main)}
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--header-h);background:var(--blue);display:flex;align-items:center;padding:0 18px;box-shadow:0 3px 12px rgba(0,0,0,.35)}
.tb-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tb-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-4ps{height:42px;width:auto;object-fit:contain;background:#fff;border-radius:7px;padding:3px 8px;}
.logo-dswd{height:42px;width:auto;object-fit:contain;background:#fff;border-radius:7px;padding:3px 8px;}
.tb-divider{width:1px;height:36px;background:rgba(255,255,255,.22);margin:0 10px}
.tb-titles .agency{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:.6px}
.tb-titles .sub{font-size:10px;color:rgba(255,255,255,.72);letter-spacing:.4px;margin-top:1px}
.tb-program{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--yellow);letter-spacing:.8px;text-transform:uppercase}
.tb-icon-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.13);border:none;color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .2s;position:relative}
.tb-icon-btn:hover{background:rgba(255,255,255,.28)}
.notif-badge-dot{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;border:1.5px solid var(--blue)}
/* NOTIFICATION DROPDOWN */
.notif-dropdown{position:absolute;top:42px;right:-10px;width:320px;background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.22);z-index:500;display:none;overflow:hidden}
.notif-dropdown.open{display:block}
.logo-dropdown{position:absolute;top:42px;right:-10px;width:280px;background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.22);z-index:500;display:none;overflow:hidden}
.logo-dropdown.open{display:block}
.notif-head{background:var(--blue);color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.notif-head span{font-size:11px;background:var(--red);padding:1px 7px;border-radius:10px;font-weight:700}
.notif-item{display:flex;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.notif-item:hover{background:#F0F5FF}
.notif-icon-box{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.notif-text{flex:1;min-width:0}
.notif-title{font-size:12.5px;font-weight:700;color:var(--text-main)}
.notif-body{font-size:11.5px;color:var(--text-soft);margin-top:2px;line-height:1.4}
.notif-time{font-size:10px;color:var(--text-soft);margin-top:3px}
.notif-footer{padding:10px 14px;text-align:center;font-size:12px;color:var(--blue-mid);font-weight:600;cursor:pointer}
.notif-footer:hover{background:#F0F5FF}
/* SEARCH */
.search-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,26,58,.7);z-index:400;display:none;align-items:flex-start;justify-content:center;padding-top:100px;backdrop-filter:blur(4px)}
.search-overlay.open{display:flex}
.search-box{background:#fff;border-radius:14px;width:100%;max-width:580px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.topbar{display:none}
.search-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
.search-input-wrap i{color:var(--text-soft);font-size:16px}
.search-input{flex:1;border:none;outline:none;font-size:16px;font-family:'Barlow',sans-serif;color:var(--text-main)}
.search-input::placeholder{color:#aaa}
.search-close-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-soft);padding:4px 8px;border-radius:5px;font-family:'Barlow',sans-serif}
.search-close-btn:hover{background:#F0F5FF}
.search-results{max-height:360px;overflow-y:auto}
.search-result-item{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.search-result-item:hover{background:#F0F5FF}
.search-result-item:last-child{border-bottom:none}
.sr-icon{width:32px;height:32px;border-radius:7px;background:#E8F0FB;display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:13px;flex-shrink:0}
.sr-title{font-size:13px;font-weight:700;color:var(--text-main)}
.sr-desc{font-size:11.5px;color:var(--text-soft);margin-top:1px}
.search-empty{padding:30px;text-align:center;color:var(--text-soft);font-size:13px}
.search-section-label{padding:8px 18px 4px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);background:#FAFCFF}
/* LAYOUT */
.layout{display:flex;margin-top:0;min-height:100vh;position:relative}
.sidebar{width:52px;flex-shrink:0;background:var(--dark);color:#fff;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;z-index:200;transition:width .3s cubic-bezier(.4,0,.2,1)}
.sidebar:hover{width:var(--sidebar-w);box-shadow:4px 0 24px rgba(0,0,0,.35)}
.sidebar .nav-label,.sidebar .sidebar-label,.sidebar .sidebar-bottom-label{opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .2s}
.sidebar:hover .nav-label,.sidebar:hover .sidebar-label,.sidebar:hover .sidebar-bottom-label{opacity:1;pointer-events:auto}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.sidebar-section{padding:14px 0 4px}
.sidebar-label{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.35);padding:0 16px 5px;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.68);border-left:3px solid transparent;transition:all .2s;text-decoration:none;user-select:none;white-space:nowrap;overflow:hidden}
.nav-item i{width:20px;text-align:center;font-size:14px;flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;border-left-color:var(--yellow)}
.nav-item.active{background:rgba(0,87,183,.55);color:#fff;border-left-color:var(--yellow);font-weight:600}
.sidebar hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:5px 0}
.sidebar-bottom{margin-top:auto;padding:10px 0;border-top:1px solid rgba(255,255,255,.08)}
.main{margin-left:52px;flex:1;min-width:0;display:flex;flex-direction:column;transition:margin-left .3s cubic-bezier(.4,0,.2,1)}
.sidebar:hover ~ .main{margin-left:var(--sidebar-w)}
/* PAGES */
.page{display:none;padding:22px;flex:1;animation:fadeUp .35s ease both}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ph-left h2{font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:800;color:var(--blue);display:flex;align-items:center;gap:9px}
.ph-left h2 .ab{width:4px;height:24px;background:var(--red);border-radius:2px;flex-shrink:0}
.ph-left .bc{font-size:11.5px;color:var(--text-soft);margin-top:3px}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:7px 16px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Barlow',sans-serif;transition:background .2s}
.btn-primary:hover{background:var(--blue-mid)}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.08);overflow:hidden;margin-bottom:16px}
.card-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#FAFCFF}
.card-head h3{font-family:'Barlow Condensed',sans-serif;font-size:14.5px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:7px}
.card-head h3 i{color:var(--blue-light);font-size:13px}
.card-body{padding:16px}
.card-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;background:#E8F0FB;color:var(--blue-mid)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.kpi-card{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 5px rgba(0,0,0,.08);border-top:4px solid var(--blue);transition:transform .2s,box-shadow .2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.12)}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between}
.kpi-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);font-weight:600}
.kpi-icon{font-size:22px;opacity:.14}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:800;line-height:1;margin-top:7px}
.kpi-sub{font-size:11px;color:var(--text-soft);margin-top:4px}
.kpi-trend{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600}
.kpi-trend.up{color:var(--green)}.kpi-trend.down{color:var(--red)}
#car-map{height:390px;z-index:1}
.leaflet-container{background:#aad3df !important}
.leaflet-popup-content-wrapper{border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.2);padding:0;overflow:hidden}
.leaflet-popup-content{margin:0;font-family:'Barlow',sans-serif;font-size:12px;line-height:1.5;min-width:180px}
.leaflet-popup-tip-container{display:none}
.leaflet-control-attribution{font-size:9px !important}
.looker-wrap{background:#fff;border-radius:10px;border:1px solid var(--border);padding:0;overflow:hidden;height:620px;position:relative;margin-top:15px;display:flex;flex-direction:column;gap:15px}
.looker-wrap iframe{width:100%;height:100%;border:none;flex:1}
.looker-wrap iframe:last-child{border-top:1px solid var(--border)}
.data-table{width:100%;border-collapse:collapse;font-size:12.5px}
.data-table thead th{background:var(--blue);color:#fff;padding:9px 12px;text-align:left;font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
.data-table tbody tr:nth-child(even){background:#F4F8FF}
.data-table tbody tr:hover{background:#E4EDFF}
.data-table tbody td{padding:8px 12px;border-bottom:1px solid var(--border)}
.sb{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:600}
.sb.active{background:#E6F4EC;color:var(--green)}.sb.pending{background:#FFF4E0;color:var(--orange)}.sb.inactive{background:#FDEAEA;color:var(--red)}
.two-col{display:grid;grid-template-columns:1.55fr 1fr;gap:15px;margin-bottom:16px}
.faq-list{display:flex;flex-direction:column;gap:9px}
.faq-item{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:3px solid var(--blue-light)}
.faq-q{padding:13px 16px;font-weight:600;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s;user-select:none}
.faq-q:hover{background:#F0F5FF}
.faq-q i{color:var(--text-soft);font-size:11px;transition:transform .2s}
.faq-item.open .faq-q i{transform:rotate(180deg)}
.faq-a{display:none;padding:0 16px 13px;font-size:13px;color:var(--text-soft);line-height:1.65;border-top:1px solid var(--border)}
.faq-item.open .faq-a{display:block}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.contact-card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 5px rgba(0,0,0,.08);display:flex;gap:13px;align-items:flex-start}
.contact-icon-box{width:42px;height:42px;border-radius:9px;background:#E8F0FB;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--blue)}
.contact-title{font-weight:700;font-size:13.5px;margin-bottom:4px}
.officers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.officer-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.08);text-align:center;transition:transform .2s,box-shadow .2s}
.officer-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.13)}
.officer-banner{height:50px;background:var(--blue)}
.officer-avatar-wrap{margin-top:-25px;display:flex;justify-content:center}
.officer-avatar{width:50px;height:50px;border-radius:50%;background:var(--blue-mid);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.officer-info{padding:7px 10px 14px}
.officer-name{font-weight:700;font-size:13px;color:var(--text-main);margin-bottom:2px}
.officer-role{font-size:10.5px;color:var(--text-soft);line-height:1.3}
.officer-badge{display:inline-block;margin-top:6px;font-size:9.5px;padding:2px 8px;border-radius:10px;font-weight:700;background:#E8F0FB;color:var(--blue)}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:18px}
.module-card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 5px rgba(0,0,0,.08);border-top:4px solid var(--blue);transition:transform .2s,box-shadow .2s;cursor:pointer}
.module-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.13)}
.module-icon{font-size:26px;margin-bottom:8px}
.module-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--blue);margin-bottom:3px}
.module-desc{font-size:12px;color:var(--text-soft);line-height:1.5}
.module-count{font-size:26px;font-weight:800;margin-top:9px;font-family:'Barlow Condensed',sans-serif}
.module-count-lbl{font-size:10.5px;color:var(--text-soft)}
.cvs-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:16px}
.cvs-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-bottom:16px}
canvas{display:block;max-width:100%}
.prog-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:8px}
.prog-label{width:85px;font-weight:600;flex-shrink:0}
.prog-bar{flex:1;background:#eee;border-radius:4px;height:9px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .6s ease}
.prog-val{font-weight:700;width:32px;text-align:right;flex-shrink:0}
.footer{background:var(--blue);color:rgba(255,255,255,.9)}
.footer-main{display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr;gap:28px;padding:28px 32px 22px}
.gov-seal-ft{width:46px;height:46px;background:#fff;border-radius:50%;border:2.5px solid var(--yellow);display:flex;align-items:center;justify-content:center;color:var(--blue);font-weight:900;font-size:13px;font-family:'Barlow Condensed',sans-serif;margin-bottom:9px}
.footer-brand h4{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.5px;margin-bottom:4px}
.footer-brand p{font-size:11.5px;opacity:.72;line-height:1.6}
.footer-col h5{font-family:'Barlow Condensed',sans-serif;font-size:12.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--yellow);margin-bottom:9px}
.footer-col ul{list-style:none}
.footer-col ul li{margin-bottom:6px}
.footer-col ul li a{color:rgba(255,255,255,.72);font-size:12px;text-decoration:none;transition:color .15s;cursor:pointer}
.footer-col ul li a:hover{color:#fff}
.footer-contact p{font-size:12px;opacity:.8;margin-bottom:6px;line-height:1.5;display:flex;gap:6px;align-items:flex-start}
.footer-contact p i{margin-top:2px;opacity:.7;font-size:11px}
.footer-bottom{background:rgba(0,0,0,.25);padding:11px 32px;display:flex;align-items:center;justify-content:space-between;font-size:11px;opacity:.75;flex-wrap:wrap;gap:7px}
.footer-bottom a{color:rgba(255,255,255,.8);text-decoration:none}
.footer-bottom a:hover{color:var(--yellow)}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.officers-grid{grid-template-columns:repeat(2,1fr)}.footer-main{grid-template-columns:1fr 1fr}.cvs-grid{grid-template-columns:1fr}.cvs-3col{grid-template-columns:1fr}}
@media(max-width:768px){.module-grid{grid-template-columns:1fr 1fr}.contact-grid{grid-template-columns:1fr}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
<script>
// ── IMAGES ──
window._PS4_SRC = "4Ps-DMIS-Dashboardd/4pslogo.png";
window._DSWD_SRC = "4Ps-DMIS-Dashboardd/Screenshot 2026-03-05 084849.png";

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('logo4ps').src = localStorage.getItem('logo4ps') || window._PS4_SRC || '';
  document.getElementById('logoDswd').src = localStorage.getItem('logoDswd') || window._DSWD_SRC || '';
});

// ── NAVIGATION ──
function showPage(id, navEl) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var t = document.getElementById('page-' + id);
  if (t) t.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  if (navEl) navEl.classList.add('active');
  window.scrollTo(0, 0);
}

function toggleFaq(el) { el.closest('.faq-item').classList.toggle('open'); }

// ── NOTIFICATIONS ──
var notifCount = 4;
function toggleNotif(e) {
  e.stopPropagation();
  document.getElementById('notif-dropdown').classList.toggle('open');
}
function markRead(item) {
  if (item.dataset.read) return;
  item.dataset.read = '1';
  item.style.opacity = '0.5';
  item.style.background = '#fafcff';
  notifCount = Math.max(0, notifCount - 1);
  updateNotifBadge();
}
function clearAllNotifs() {
  document.querySelectorAll('.notif-item').forEach(function(i) {
    i.dataset.read = '1'; i.style.opacity = '0.5'; i.style.background = '#fafcff';
  });
  notifCount = 0;
  updateNotifBadge();
  document.getElementById('notif-dropdown').classList.remove('open');
}
function updateNotifBadge() {
  var badge = document.getElementById('notif-badge');
  var label = document.getElementById('notif-count-label');
  if (notifCount === 0) {
    badge.style.display = 'none';
    label.textContent = 'All read';
  } else {
    badge.style.display = 'flex';
    badge.textContent = notifCount;
    label.textContent = notifCount + ' new';
  }
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#notif-btn') && !e.target.closest('#notif-dropdown')) {
    document.getElementById('notif-dropdown').classList.remove('open');
  }
  if (!e.target.closest('#logo-btn') && !e.target.closest('#logo-dropdown')) {
    document.getElementById('logo-dropdown').classList.remove('open');
  }
});

function toggleLogoPanel(e) {
  e.stopPropagation();
  document.getElementById('logo-dropdown').classList.toggle('open');
}
function uploadLogo(input, imgId, key) {
  var f = input.files && input.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function() {
    var data = r.result;
    document.getElementById(imgId).src = data;
    localStorage.setItem(key, data);
  };
  r.readAsDataURL(f);
}
function resetLogos() {
  localStorage.removeItem('logo4ps');
  localStorage.removeItem('logoDswd');
  document.getElementById('logo4ps').src = window._PS4_SRC || '';
  document.getElementById('logoDswd').src = window._DSWD_SRC || '';
  document.getElementById('logo-dropdown').classList.remove('open');
}

// ── SEARCH ──
var SEARCH_PAGES = [
  {id:'ict', icon:'fa-laptop-code', title:'ICT', desc:'System status, network, help desk'},
  {id:'bdmu', icon:'fa-database', title:'BDMU', desc:'Beneficiary data management, validation'},
  {id:'cvs', icon:'fa-check-double', title:'CVS', desc:'Compliance verification, NAS/NASH tracking'},
  {id:'grs', icon:'fa-hand-holding-heart', title:'GRS', desc:'Grievance redress system, complaints'},
  {id:'officers', icon:'fa-users', title:'DMIS Officers', desc:'FO-CAR officer directory'},
  {id:'faqs', icon:'fa-question-circle', title:'FAQs', desc:'Frequently asked questions and guides'},
  {id:'contact', icon:'fa-envelope', title:'Contact Us', desc:'Office address, phone, email, hotline'},
];
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(function() { document.getElementById('search-input').focus(); }, 50);
  doSearch('');
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
}
function closeSearchBg(e) {
  if (e.target === document.getElementById('search-overlay')) closeSearch();
}
function doSearch(q) {
  var r = document.getElementById('search-results');
  q = q.toLowerCase().trim();
  var filtered = q === '' ? SEARCH_PAGES : SEARCH_PAGES.filter(function(p) {
    return p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.id.includes(q);
  });
  if (filtered.length === 0) {
    r.innerHTML = '<div class="search-empty">No results for "' + q + '"</div>';
    return;
  }
  var label = '<div class="search-section-label">' + (q ? 'Search Results' : 'All Pages') + '</div>';
  var items = filtered.map(function(p) {
    return '<div class="search-result-item" onclick="goSearch(\'' + p.id + '\')">'
      + '<div class="sr-icon"><i class="fa ' + p.icon + '"></i></div>'
      + '<div><div class="sr-title">' + p.title + '</div><div class="sr-desc">' + p.desc + '</div></div>'
      + '</div>';
  }).join('');
  r.innerHTML = label + items;
}
function goSearch(id) {
  closeSearch();
  var navItems = document.querySelectorAll('.nav-item');
  var found = null;
  navItems.forEach(function(n) {
    if (n.getAttribute('onclick') && n.getAttribute('onclick').indexOf("'" + id + "'") !== -1) found = n;
  });
  showPage(id, found);
}
</script>
